name: "Release Action"

on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - 'v*.*.*' # Push events to matching v*, i.e. v1.0, v4.7.0
  workflow_dispatch:

env:
  ACTION_NAME: ${{ vars.ACTION_NAME }}

jobs:
  release:
    permissions:
      contents: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve and verify release tag
        run: |
          git fetch --tags --force

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1)
            if [ -z "$TAG" ]; then
              echo "::error::No SemVer tags found"
              exit 1
            fi
            echo "Manual run: using latest tag $TAG"
          else
            TAG="${GITHUB_REF_NAME}"
            echo "Tag push run: using tag $TAG"
          fi

          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag $TAG is not strict SemVer (vMAJOR.MINOR.PATCH)"
            exit 1
          fi

          latest_tag=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1)

          if [ "$TAG" != "$latest_tag" ]; then
            echo "::error::Tag $TAG is not the latest SemVer tag"
            exit 1
          fi

          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Get latest release
        id: latest
        uses: pozetroninc/github-action-get-latest-release@v0.8.0
        with:
          repository: ${{ github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}
          excludes: draft

      - name: Generate changelog
        id: changelog
        uses: metcalfc/changelog-generator@v4
        with:
          myToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest
        uses: actions/attest@v4
        with:
          subject-path: '${{ github.workspace }}/recovery-lock-rotation.sh'

      - name: Create GitHub Release
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref }}
          name: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## ${{ env.ACTION_NAME }}
            This is a version of **${{ github.repository }}** released by GitHub Actions.
            ___
            ## Changes since [${{ steps.latest.outputs.release }}](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.latest.outputs.release }})
            ${{ steps.changelog.outputs.changelog }}

            #### Full Changelog: [${{ steps.latest.outputs.release }}...${{ env.RELEASE_TAG }}](${{ github.server_url }}/${{ github.repository }}/compare/${{ steps.latest.outputs.release }}...${{ env.RELEASE_TAG }})
            <sup>Contributed by ${{ vars.CONTRIBUTORS }}</sup>
